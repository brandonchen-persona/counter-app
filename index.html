<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a12">
<title>Tally</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230a0a12'/%3E%3Ccircle cx='38' cy='50' r='22' fill='none' stroke='%2300f0ff' stroke-width='7'/%3E%3Ccircle cx='62' cy='50' r='22' fill='none' stroke='%23ff2d95' stroke-width='7'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230a0a12'/%3E%3Ccircle cx='38' cy='50' r='22' fill='none' stroke='%2300f0ff' stroke-width='7'/%3E%3Ccircle cx='62' cy='50' r='22' fill='none' stroke='%23ff2d95' stroke-width='7'/%3E%3C/svg%3E">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app"></div>

<template id="tpl-home">
  <div class="screen home-screen">
    <div class="home-header">
      <h1 class="brand"><span class="glow-blue">Tal</span><span class="glow-pink">ly</span></h1>
      <p class="tagline">Track what matters, daily.</p>
    </div>
    <div class="mode-buttons">
      <button class="mode-btn mode-btn--blue" data-action="go-spend">
        <span class="mode-icon">$</span>
        <span class="mode-label">Spend</span>
      </button>
      <button class="mode-btn mode-btn--pink" data-action="go-calories">
        <span class="mode-icon">◷</span>
        <span class="mode-label">Calories</span>
      </button>
    </div>
    <button class="link-btn" data-action="go-analytics">View Analytics →</button>
  </div>
</template>

<template id="tpl-spend">
  <div class="screen tracker-screen" data-theme="blue">
    <header class="tracker-header">
      <button class="icon-btn" data-action="go-home" aria-label="Home">←</button>
      <h2>Spend</h2>
      <button class="icon-btn" data-action="open-settings-spend" aria-label="Settings">⚙</button>
    </header>

    <div class="stat-cards">
      <div class="stat-card">
        <div class="stat-label">Today Remaining</div>
        <div class="stat-value" id="spend-today-remaining">$0.00</div>
        <div class="stat-bar"><div class="stat-bar-fill" id="spend-today-bar"></div></div>
        <div class="stat-sub" id="spend-today-sub">of $0.00</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Month Remaining</div>
        <div class="stat-value" id="spend-month-remaining">$0.00</div>
        <div class="stat-bar"><div class="stat-bar-fill" id="spend-month-bar"></div></div>
        <div class="stat-sub" id="spend-month-sub">of $0.00</div>
      </div>
    </div>

    <form class="entry-form" id="spend-form">
      <input type="number" inputmode="decimal" step="0.01" min="0" placeholder="Cost" id="spend-amount" required>
      <input type="text" placeholder="Good / service" id="spend-desc" required>
      <button type="submit" class="add-btn add-btn--blue">Add</button>
    </form>

    <div class="entry-list-wrap">
      <div class="entry-list-title">Today's Transactions</div>
      <ul class="entry-list" id="spend-list"></ul>
    </div>

    <button class="link-btn" data-action="go-analytics">View Analytics →</button>
  </div>
</template>

<template id="tpl-calories">
  <div class="screen tracker-screen" data-theme="pink">
    <header class="tracker-header">
      <button class="icon-btn" data-action="go-home" aria-label="Home">←</button>
      <h2>Calories</h2>
      <button class="icon-btn" data-action="open-settings-calories" aria-label="Settings">⚙</button>
    </header>

    <div class="stat-cards">
      <div class="stat-card stat-card--wide">
        <div class="stat-label">Today Remaining</div>
        <div class="stat-value" id="cal-today-remaining">0 kcal</div>
        <div class="stat-bar"><div class="stat-bar-fill" id="cal-today-bar"></div></div>
        <div class="stat-sub" id="cal-today-sub">of 0 kcal goal</div>
      </div>
    </div>

    <form class="entry-form" id="cal-form">
      <input type="number" inputmode="numeric" step="1" min="0" placeholder="Calories" id="cal-amount" required>
      <input type="text" placeholder="Item eaten" id="cal-desc" required>
      <button type="submit" class="add-btn add-btn--pink">Add</button>
    </form>

    <div class="entry-list-wrap">
      <div class="entry-list-title">Today's Food</div>
      <ul class="entry-list" id="cal-list"></ul>
    </div>

    <button class="link-btn" data-action="go-analytics">View Analytics →</button>
  </div>
</template>

<template id="tpl-analytics">
  <div class="screen analytics-screen">
    <header class="tracker-header">
      <button class="icon-btn" data-action="go-home" aria-label="Home">←</button>
      <h2>Analytics</h2>
      <span class="icon-btn icon-btn--ghost"></span>
    </header>

    <div class="tabs">
      <button class="tab-btn tab-btn--blue active" data-action="analytics-tab" data-tab="spend">Spend</button>
      <button class="tab-btn tab-btn--pink" data-action="analytics-tab" data-tab="calories">Calories</button>
    </div>

    <div class="summary-cards" id="analytics-summary"></div>

    <div class="chart-block">
      <div class="chart-title">By Week</div>
      <div class="bar-chart" id="chart-weekly"></div>
    </div>

    <div class="chart-block">
      <div class="chart-title">By Month</div>
      <div class="bar-chart" id="chart-monthly"></div>
    </div>
  </div>
</template>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="modal-title">Settings</div>
    <label class="modal-label" id="modal-label" for="modal-input">Monthly Budget ($)</label>
    <input type="number" inputmode="decimal" min="0" step="1" id="modal-input" class="modal-input">
    <div class="modal-actions">
      <button class="modal-btn modal-btn--ghost" data-action="close-modal">Cancel</button>
      <button class="modal-btn modal-btn--solid" id="modal-save">Save</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
